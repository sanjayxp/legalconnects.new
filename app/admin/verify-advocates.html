<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Advocates — LegalConnects Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
  :root{
    --ink:#1a2233;--ink-soft:#4b5568;--ink-faint:#8a93a5;
    --accent:#3e5bd9;--accent-dark:#2f46ad;--accent-soft:#eef1fd;
    --green:#0e8a5f;--green-soft:#e7f6ef;
    --red:#c0392b;--red-soft:#fdecea;
    --amber:#b45309;--amber-soft:#fdf3e3;
    --bg:#fafbfd;--card:#ffffff;--line:#e6e9f0;
    --shadow:0 1px 3px rgba(26,34,51,.06),0 8px 24px rgba(26,34,51,.07);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink)}
  a{text-decoration:none;color:inherit}
  header{background:var(--ink);color:#fff;position:sticky;top:0;z-index:50}
  .nav{max-width:1120px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:20px;height:60px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:800;letter-spacing:-.02em}
  .logo-mark{width:28px;height:28px;border-radius:7px;background:#3e5bd9;color:#fff;display:grid;place-items:center;font-size:14px}
  .admin-chip{padding:3px 10px;border-radius:99px;background:rgba(255,255,255,.15);font-size:12px;font-weight:700;color:#fff}
  .adminnav{display:flex;gap:4px;margin-left:12px}
  .adminnav a{padding:8px 12px;border-radius:8px;font-size:13.5px;font-weight:600;color:rgba(255,255,255,.75)}
  .adminnav a:hover{background:rgba(255,255,255,.08);color:#fff}
  .adminnav a.on{background:rgba(255,255,255,.15);color:#fff}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .btn-ghost{padding:7px 14px;border-radius:8px;font:inherit;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.2);background:transparent;cursor:pointer}
  .btn-ghost:hover{background:rgba(255,255,255,.1);color:#fff}
  main{max-width:1120px;margin:0 auto;padding:32px 24px}
  h1{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
  .sub{color:var(--ink-soft);font-size:14px;margin-bottom:24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:22px;margin-bottom:16px;display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
  .ph{width:56px;height:56px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-weight:800;font-size:20px;object-fit:cover;flex-shrink:0}
  .details{flex:1;min-width:240px}
  .details h3{font-size:16px;font-weight:800;margin-bottom:2px}
  .details .meta{font-size:13px;color:var(--ink-soft);margin-bottom:8px}
  .details .field{font-size:13.5px;margin-bottom:4px}
  .details .field b{color:var(--ink-soft);font-weight:600}
  .badge{display:inline-flex;padding:3px 10px;border-radius:99px;background:var(--amber-soft);color:var(--amber);font-size:12px;font-weight:700}
  .actions{display:flex;gap:10px;flex-shrink:0}
  .btn{border:none;border-radius:10px;padding:10px 16px;font:inherit;font-size:13.5px;font-weight:700;cursor:pointer}
  .btn-approve{background:var(--green-soft);color:var(--green)}
  .btn-approve:hover{background:#d3f0e2}
  .btn-reject{background:var(--red-soft);color:var(--red)}
  .btn-reject:hover{background:#f9d9d5}
  .empty{text-align:center;padding:60px 20px;color:var(--ink-faint)}
</style>
</head>
<body>

<header>
  <nav class="nav">
    <a href="../index.html" class="logo"><div class="logo-mark">⚖</div>LegalConnects</a>
    <span class="admin-chip">Admin</span>
    <div class="adminnav">
      <a href="../dashboard/admin.html">Overview</a>
      <a href="jobs.html">Jobs</a>
      <a href="courses.html">Courses</a>
      <a href="team.html">Team</a>
      <a href="verify-advocates.html" class="on">Verifications</a>
    </div>
    <div class="nav-right"><button class="btn-ghost" id="signoutBtn">Sign out</button></div>
  </nav>
</header>

<main>
  <h1>Advocate verifications</h1>
  <div class="sub">First-time advocate profiles wait here until approved. Once approved, an advocate's own future edits go live instantly — no re-review needed.</div>
  <div id="list"><div class="empty">Loading…</div></div>
</main>

<script type="module">
import { requireAuth, getCurrentProfile, signOut } from '../js/auth.js';
import { listPendingAdvocates, reviewAdvocateProfile } from '../js/cms.js';

const session = await requireAuth();
const profile = await getCurrentProfile();
if (profile && profile.role !== 'admin') {
  window.location.href = profile.role === 'advocate' ? '../dashboard/advocate.html' : '../dashboard/client.html';
}
document.getElementById('signoutBtn').addEventListener('click', signOut);

function esc(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

async function render() {
  const list = document.getElementById('list');
  const pending = await listPendingAdvocates();
  if (!pending.length) { list.innerHTML = '<div class="empty">🎉 No pending verifications right now.</div>'; return; }
  list.innerHTML = pending.map(a => {
    const name = a.profiles?.full_name || 'Unnamed advocate';
    return `<div class="card" data-id="${a.id}">
      ${a.photo_url ? `<img class="ph" src="${esc(a.photo_url)}">` : `<div class="ph">${esc(name.charAt(0))}</div>`}
      <div class="details">
        <h3>${esc(name)} <span class="badge">Pending</span></h3>
        <div class="meta">Submitted ${new Date(a.submitted_at).toLocaleDateString()} · Phone: ${esc(a.profiles?.phone || '—')}</div>
        <div class="field"><b>Bar enrolment no.:</b> ${esc(a.bar_number || '—')}</div>
        <div class="field"><b>Practice areas:</b> ${(a.practice_areas||[]).map(esc).join(', ') || '—'}</div>
        <div class="field"><b>Experience:</b> ${a.experience_years != null ? a.experience_years + ' yrs' : '—'}</div>
        <div class="field"><b>Fee range:</b> ${esc(a.fee_range || '—')}</div>
        <div class="field"><b>Bio:</b> ${esc(a.bio || '—')}</div>
      </div>
      <div class="actions">
        <button class="btn btn-approve" data-approve="${a.id}">✓ Approve</button>
        <button class="btn btn-reject" data-reject="${a.id}">✕ Reject</button>
      </div>
    </div>`;
  }).join('');

  list.querySelectorAll('[data-approve]').forEach(b => b.addEventListener('click', async () => {
    await reviewAdvocateProfile(b.dataset.approve, 'approved', session.user.id);
    render();
  }));
  list.querySelectorAll('[data-reject]').forEach(b => b.addEventListener('click', async () => {
    if (!confirm('Reject this advocate profile? They will remain unverified until they resubmit.')) return;
    await reviewAdvocateProfile(b.dataset.reject, 'rejected', session.user.id);
    render();
  }));
}
render();
</script>
</body>
</html>
