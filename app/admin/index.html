<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Console — LegalConnects</title>
<meta name="robots" content="noindex,nofollow">
<style>
  :root{
    --ink:#1a2233;--ink-soft:#4b5568;--ink-faint:#8a93a5;
    --accent:#3e5bd9;--accent-dark:#2f46ad;
    --red:#c0392b;--red-soft:#fdecea;--green:#0e8a5f;--green-soft:#e7f6ef;
    --line:#e6e9f0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;background:#12192b;color:#fff;min-height:100vh;display:grid;place-items:center;padding:24px}
  .card{background:#1a2233;border:1px solid rgba(255,255,255,.1);border-radius:18px;width:100%;max-width:400px;padding:34px;box-shadow:0 24px 64px rgba(0,0,0,.4)}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .logo .mark{width:32px;height:32px;border-radius:9px;background:var(--accent);display:grid;place-items:center;font-size:16px}
  .logo b{font-size:17px}
  .tag{display:inline-block;background:#ffd166;color:#12192b;font-size:11px;font-weight:800;border-radius:99px;padding:3px 12px;letter-spacing:.05em;margin-bottom:18px}
  .sub{font-size:13px;color:#aeb6c6;margin-bottom:22px}
  label{font-size:12px;font-weight:700;color:#c3cad8;display:block;margin:14px 0 6px}
  input{width:100%;border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:12px 14px;font:inherit;font-size:14.5px;background:rgba(255,255,255,.06);color:#fff;outline:none;transition:border-color .15s}
  input:focus{border-color:var(--accent)}
  input::placeholder{color:#5b6478}
  .btn{width:100%;border:none;border-radius:11px;padding:13px;font:inherit;font-size:15px;font-weight:700;background:var(--accent);color:#fff;cursor:pointer;margin-top:20px;transition:background .15s}
  .btn:hover{background:var(--accent-dark)}
  .btn:disabled{opacity:.6;cursor:wait}
  .msg{border-radius:10px;padding:11px 14px;font-size:13.5px;margin-top:14px;display:none}
  .msg.err{display:block;background:rgba(192,57,43,.18);color:#ff9d8f;border:1px solid rgba(192,57,43,.4)}
  .note{font-size:11.5px;color:#5b6478;text-align:center;margin-top:18px;line-height:1.6}
  .backsite{display:block;text-align:center;margin-top:14px;font-size:12.5px;color:#8a93a5;text-decoration:none}
  .backsite:hover{color:#fff}
</style>
</head>
<body>

<div class="card">
  <div class="logo"><span class="mark">⚖</span><b>LegalConnects</b></div>
  <span class="tag">ADMIN CONSOLE</span>
  <div class="sub">Restricted area — authorized staff only. All actions are logged.</div>

  <label for="email">Admin email</label>
  <input type="email" id="email" placeholder="admin@legalconnects.in" autocomplete="email">
  <label for="pass">Password</label>
  <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
  <button class="btn" id="btn">Sign in to Admin</button>
  <div class="msg" id="msg"></div>

  <div class="note">Client or advocate? Use the regular <a href="../auth/login.html" style="color:#9db1ff">sign-in page</a>.<br>Production: this route gets 2FA before launch.</div>
  <a class="backsite" href="../../">← legalconnects website</a>
</div>

<script type="module">
import { supabase } from '../js/config.js';
import { loginUser, getCurrentProfile } from '../js/auth.js';

const say = (t) => { const m=document.getElementById('msg'); m.className='msg'+(t?' err':''); m.textContent=t; };
const busy = (on) => { const b=document.getElementById('btn'); b.disabled=on; b.textContent=on?'Verifying…':'Sign in to Admin'; };

// Already signed in as an admin? Straight through.
const { data: { session } } = await supabase.auth.getSession();
if (session) {
  const p = await getCurrentProfile();
  if (p && p.role === 'admin') location.href = '../dashboard/admin.html';
}

async function go(){
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  if (!email || !pass) { say('Enter your admin email and password.'); return; }
  busy(true);
  try {
    await loginUser({ email, password: pass });
    const profile = await getCurrentProfile();
    if (profile && profile.role === 'admin') {
      location.href = '../dashboard/admin.html';
    } else {
      // Signed in but NOT an admin — sign out immediately, reveal nothing extra
      await supabase.auth.signOut();
      say('This account does not have admin access.');
    }
  } catch (err) {
    say(err.message === 'Invalid login credentials' ? 'Email or password is incorrect.' : (err.message || 'Something went wrong.'));
  } finally { busy(false); }
}
document.getElementById('btn').addEventListener('click', go);
document.getElementById('pass').addEventListener('keydown', e => { if (e.key==='Enter') go(); });
</script>

</body>
</html>
