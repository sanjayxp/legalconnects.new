<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Courses — LegalConnects Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
  :root{
    --ink:#1a2233;--ink-soft:#4b5568;--ink-faint:#8a93a5;
    --accent:#3e5bd9;--accent-dark:#2f46ad;--accent-soft:#eef1fd;
    --green:#0e8a5f;--green-soft:#e7f6ef;
    --red:#c0392b;--red-soft:#fdecea;
    --bg:#fafbfd;--card:#ffffff;--line:#e6e9f0;
    --shadow:0 1px 3px rgba(26,34,51,.06),0 8px 24px rgba(26,34,51,.07);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink)}
  a{text-decoration:none;color:inherit}
  header{background:var(--ink);color:#fff;position:sticky;top:0;z-index:50}
  .nav{max-width:1120px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:20px;height:60px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:800;letter-spacing:-.02em}
  .logo-mark{width:28px;height:28px;border-radius:7px;background:#3e5bd9;color:#fff;display:grid;place-items:center;font-size:14px}
  .admin-chip{padding:3px 10px;border-radius:99px;background:rgba(255,255,255,.15);font-size:12px;font-weight:700;color:#fff}
  .adminnav{display:flex;gap:4px;margin-left:12px}
  .adminnav a{padding:8px 12px;border-radius:8px;font-size:13.5px;font-weight:600;color:rgba(255,255,255,.75)}
  .adminnav a:hover{background:rgba(255,255,255,.08);color:#fff}
  .adminnav a.on{background:rgba(255,255,255,.15);color:#fff}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .btn-ghost{padding:7px 14px;border-radius:8px;font:inherit;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.2);background:transparent;cursor:pointer}
  .btn-ghost:hover{background:rgba(255,255,255,.1);color:#fff}
  main{max-width:1120px;margin:0 auto;padding:32px 24px}
  .pagehead{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:16px;flex-wrap:wrap}
  h1{font-size:24px;font-weight:800;letter-spacing:-.02em}
  .sub{color:var(--ink-soft);font-size:14px;margin-top:2px}
  .btn{border:none;border-radius:10px;padding:11px 18px;font:inherit;font-size:14px;font-weight:700;background:var(--accent);color:#fff;cursor:pointer}
  .btn:hover{background:var(--accent-dark)}
  .btn-sm{padding:7px 12px;font-size:13px;border-radius:8px}
  .btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--ink-soft)}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent)}
  .btn-danger{background:var(--red-soft);color:var(--red)}
  .btn-danger:hover{background:#f9d9d5}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:22px;margin-bottom:16px}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);padding:8px 10px;border-bottom:1px solid var(--line)}
  td{padding:12px 10px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700}
  .pill.active{background:var(--green-soft);color:var(--green)}
  .pill.closed{background:var(--red-soft);color:var(--red)}
  .row-actions{display:flex;gap:8px}
  .empty{text-align:center;padding:50px 20px;color:var(--ink-faint)}
  .modal-bg{position:fixed;inset:0;background:rgba(15,20,34,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}
  .modal-bg.open{display:flex}
  .modal{background:#fff;border-radius:18px;padding:28px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.3)}
  .modal h2{font-size:19px;font-weight:800;margin-bottom:18px}
  label{font-size:12.5px;font-weight:700;color:var(--ink-soft);display:block;margin:14px 0 6px}
  input,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;font-size:14px;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:70px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .checkline{display:flex;align-items:center;gap:8px;margin-top:14px}
  .checkline input{width:auto}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}
  .msg{font-size:13px;margin-top:10px;padding:10px 12px;border-radius:8px;display:none}
  .msg.err{display:block;background:var(--red-soft);color:var(--red)}
</style>
</head>
<body>

<header>
  <nav class="nav">
    <div class="logo"><div class="logo-mark">⚖</div>LegalConnects</div>
    <span class="admin-chip">Admin</span>
    <div class="adminnav">
      <a href="../dashboard/admin.html">Overview</a>
      <a href="jobs.html">Jobs</a>
      <a href="courses.html" class="on">Courses</a>
      <a href="team.html">Team</a>
      <a href="verify-advocates.html">Advocates</a>
      <a href="clients.html">Clients</a>
      <a href="admins.html">Admins</a>
    </div>
    <div class="nav-right"><button class="btn-ghost" id="signoutBtn">Sign out</button></div>
  </nav>
</header>

<main>
  <div class="pagehead">
    <div>
      <h1>Courses &amp; webinars</h1>
      <div class="sub">Entries here appear live in the "Jobs &amp; Learning" section of the public site.</div>
    </div>
    <button class="btn" id="newBtn">+ New course</button>
  </div>

  <div class="card">
    <table>
      <thead><tr><th>Title</th><th>Instructor</th><th>Price</th><th>Status</th><th>Enrollments</th><th></th></tr></thead>
      <tbody id="body"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
    </table>
  </div>
</main>

<div class="modal-bg" id="enrolleesModal">
  <div class="modal">
    <h2 id="enrolleesTitle">Enrollees</h2>
    <div id="enrolleesList" style="margin-top:14px"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="enrolleesCloseBtn">Close</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="editModal">
  <div class="modal">
    <h2 id="modalTitle">New course</h2>
    <input type="hidden" id="f-id">
    <label>Title</label>
    <input id="f-title" placeholder="e.g. GST Litigation &amp; Departmental Proceedings">
    <div class="grid2">
      <div><label>Type</label>
        <select id="f-tag"><option>Certificate Course</option><option>Webinar</option><option>Workshop</option></select>
      </div>
      <div><label>Mode</label>
        <select id="f-mode"><option>Online</option><option>Live online</option><option>In-person</option></select>
      </div>
    </div>
    <div class="grid2">
      <div><label>Instructor / provider</label><input id="f-instructor" placeholder="e.g. National Tax Law Academy"></div>
      <div><label>Duration</label><input id="f-duration" placeholder="e.g. 6 weeks"></div>
    </div>
    <label>Schedule text (shown on card)</label>
    <input id="f-schedule" placeholder="e.g. Starts 20 Jul 2026, or Fri 17 Jul · 6 PM">
    <div class="grid2">
      <div><label>Price (₹, blank/0 if free)</label><input id="f-price" type="number" min="0" placeholder="e.g. 4999"></div>
      <div><label>Button label</label><input id="f-cta" placeholder="e.g. Enroll / Register"></div>
    </div>
    <label>Status</label>
    <select id="f-status"><option value="active">Active — visible on site</option><option value="closed">Closed — hidden from site</option></select>
    <div class="msg" id="modalMsg"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelBtn">Cancel</button>
      <button class="btn" id="saveBtn">Save course</button>
    </div>
  </div>
</div>

<script type="module">
import { requireAuth, getCurrentProfile, signOut } from '../js/auth.js';
import { listCoursesAdmin, saveCourse, deleteCourse, countEnrollments, listCourseEnrollees } from '../js/cms.js';

const session = await requireAuth();
const profile = await getCurrentProfile();
if (profile && profile.role !== 'admin') {
  window.location.href = profile.role === 'advocate' ? '../dashboard/advocate.html' : '../dashboard/client.html';
}
document.getElementById('signoutBtn').addEventListener('click', signOut);

const modal = document.getElementById('editModal');
const modalMsg = document.getElementById('modalMsg');
function sayModal(t){ modalMsg.className='msg'+(t?' err':''); modalMsg.textContent=t; }

const colors = ['#3e5bd9','#0e8a5f','#b45309','#7c3aed','#c0392b','#0891b2'];
function colorFor(str){ let h=0; for(const c of (str||'')) h=(h*31+c.charCodeAt(0))%colors.length; return colors[h]; }

function openModal(c) {
  sayModal('');
  document.getElementById('modalTitle').textContent = c ? 'Edit course' : 'New course';
  document.getElementById('f-id').value = c?.id || '';
  document.getElementById('f-title').value = c?.title || '';
  document.getElementById('f-tag').value = c?.tag_type || 'Certificate Course';
  document.getElementById('f-mode').value = c?.mode || 'Online';
  document.getElementById('f-instructor').value = c?.instructor || '';
  document.getElementById('f-duration').value = c?.duration || '';
  document.getElementById('f-schedule').value = c?.schedule_text || '';
  document.getElementById('f-price').value = c?.price || '';
  document.getElementById('f-cta').value = c?.cta_label || 'Enroll';
  document.getElementById('f-status').value = c?.status || 'active';
  modal.classList.add('open');
}
document.getElementById('newBtn').addEventListener('click', () => openModal(null));
document.getElementById('cancelBtn').addEventListener('click', () => modal.classList.remove('open'));

function esc(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

async function render() {
  const tbody = document.getElementById('body');
  const courses = await listCoursesAdmin();
  if (!courses.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">No courses yet. Click "+ New course" to add one.</td></tr>'; return; }
  const rows = await Promise.all(courses.map(async c => {
    const n = await countEnrollments(c.id);
    return `<tr>
      <td><b>${esc(c.title)}</b><div style="color:var(--ink-faint);font-size:12.5px">${esc(c.tag_type)}</div></td>
      <td>${esc(c.instructor||'')}</td>
      <td>${c.price ? '₹'+c.price : 'Free'}</td>
      <td><span class="pill ${c.status}">${c.status}</span></td>
      <td>${n > 0 ? `<button class="btn btn-sm btn-outline" data-enrollees="${c.id}" data-title="${esc(c.title)}">${n} →</button>` : '0'}</td>
      <td class="row-actions">
        <button class="btn btn-sm btn-outline" data-edit="${c.id}">Edit</button>
        <button class="btn btn-sm btn-danger" data-del="${c.id}">Delete</button>
      </td>
    </tr>`;
  }));
  tbody.innerHTML = rows.join('');
  tbody.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => openModal(courses.find(c => c.id === b.dataset.edit))));
  tbody.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
    if (!confirm('Delete this course? This cannot be undone.')) return;
    await deleteCourse(b.dataset.del);
    render();
  }));
  tbody.querySelectorAll('[data-enrollees]').forEach(b => b.addEventListener('click', () => openEnrollees(b.dataset.enrollees, b.dataset.title)));
}

async function openEnrollees(courseId, title) {
  document.getElementById('enrolleesTitle').textContent = `Enrollees — ${title}`;
  const list = document.getElementById('enrolleesList');
  list.innerHTML = '<div class="empty">Loading…</div>';
  document.getElementById('enrolleesModal').classList.add('open');
  try {
    const enrollees = await listCourseEnrollees(courseId);
    if (!enrollees.length) { list.innerHTML = '<div class="empty">No enrollees yet.</div>'; return; }
    list.innerHTML = enrollees.map(e => `
      <div style="border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px">
        <div style="font-weight:700">${esc(e.full_name)}</div>
        <div style="font-size:13px;color:var(--ink-soft);margin-top:2px">${esc(e.email)} · ${esc(e.phone || 'no phone given')}</div>
        <div style="font-size:12px;color:var(--ink-faint);margin-top:4px">Enrolled ${new Date(e.enrolled_at).toLocaleString()}</div>
      </div>`).join('');
  } catch (err) {
    list.innerHTML = '<div class="empty">Could not load enrollees.</div>';
  }
}
document.getElementById('enrolleesCloseBtn').addEventListener('click', () => document.getElementById('enrolleesModal').classList.remove('open'));

document.getElementById('saveBtn').addEventListener('click', async () => {
  const title = document.getElementById('f-title').value.trim();
  const instructor = document.getElementById('f-instructor').value.trim();
  if (!title) { sayModal('Title is required.'); return; }
  const priceVal = parseFloat(document.getElementById('f-price').value);
  const course = {
    id: document.getElementById('f-id').value || undefined,
    title,
    tag_type: document.getElementById('f-tag').value,
    band_color: colorFor(title),
    instructor,
    duration: document.getElementById('f-duration').value.trim(),
    mode: document.getElementById('f-mode').value,
    schedule_text: document.getElementById('f-schedule').value.trim(),
    price: isNaN(priceVal) || priceVal <= 0 ? null : priceVal,
    is_free: isNaN(priceVal) || priceVal <= 0,
    cta_label: document.getElementById('f-cta').value.trim() || 'Enroll',
    status: document.getElementById('f-status').value,
    created_by: session.user.id,
  };
  try {
    await saveCourse(course);
    modal.classList.remove('open');
    render();
  } catch (e) { sayModal(e.message || 'Could not save course.'); }
});

render();
</script>
</body>
</html>
