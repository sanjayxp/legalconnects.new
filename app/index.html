<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegalConnects</title>
<style>
  :root{--accent:#3e5bd9;--bg:#fafbfd;--ink:#1a2233;--ink-soft:#4b5568}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:grid;place-items:center}
  .center{text-align:center;padding:40px}
  .logo-mark{width:48px;height:48px;border-radius:12px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:24px;margin:0 auto 16px}
  h1{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
  p{color:var(--ink-soft);font-size:15px;margin-bottom:24px}
  .spinner{display:inline-block;width:20px;height:20px;border:2.5px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn{display:inline-block;padding:12px 24px;border-radius:10px;font-weight:700;font-size:15px;text-decoration:none;background:var(--accent);color:#fff;border:none;cursor:pointer;font:inherit;margin:0 6px;transition:opacity .15s}
  .btn:hover{opacity:.85}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid #e6e9f0}
</style>
</head>
<body>

<div class="center" id="loading">
  <div class="logo-mark">⚖</div>
  <h1>LegalConnects</h1>
  <p>Checking your session…</p>
  <div class="spinner"></div>
</div>

<div class="center" id="welcome" style="display:none">
  <div class="logo-mark">⚖</div>
  <h1>LegalConnects</h1>
  <p>Connect with Bar Council–verified advocates across India.</p>
  <a href="auth/register.html" class="btn">Get Started</a>
  <a href="auth/login.html" class="btn btn-ghost">Sign In</a>
</div>

<script type="module">
import { supabase } from './js/config.js';
import { redirectByRole } from './js/auth.js';

const { data: { session } } = await supabase.auth.getSession();

if (session) {
  // Already logged in — go to the right dashboard
  await redirectByRole();
} else {
  // Not logged in — show welcome screen
  document.getElementById('loading').style.display = 'none';
  document.getElementById('welcome').style.display = 'block';
}
</script>

</body>
</html>
