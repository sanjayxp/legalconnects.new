<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — LegalConnects</title>
<style>
  :root{
    --ink:#1a2233;--ink-soft:#4b5568;--ink-faint:#8a93a5;
    --accent:#3e5bd9;--accent-dark:#2f46ad;--accent-soft:#eef1fd;
    --green:#0e8a5f;--green-soft:#e7f6ef;
    --red:#c0392b;--red-soft:#fdecea;
    --bg:#fafbfd;--card:#ffffff;--line:#e6e9f0;
    --radius:14px;--shadow:0 1px 3px rgba(26,34,51,.06),0 8px 24px rgba(26,34,51,.07);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:24px}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);width:100%;max-width:480px;padding:40px}

  .logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
  .logo-mark{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:17px;font-weight:800}
  .logo-text{font-size:18px;font-weight:800;letter-spacing:-.02em}

  h1{font-size:22px;font-weight:800;letter-spacing:-.02em;text-align:center;margin-bottom:6px}
  .sub{font-size:14px;color:var(--ink-soft);text-align:center;margin-bottom:28px}

  /* Role selector */
  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
  .role-card{border:1.5px solid var(--line);border-radius:14px;padding:18px 14px;cursor:pointer;text-align:center;transition:all .15s;position:relative;user-select:none}
  .role-card:hover{border-color:var(--accent);background:var(--accent-soft)}
  .role-card.selected{border-color:var(--accent);background:var(--accent-soft)}
  .role-card.selected::after{content:"✓";position:absolute;top:10px;right:12px;font-size:13px;color:var(--accent);font-weight:800}
  .role-icon{font-size:28px;margin-bottom:8px;display:block}
  .role-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px}
  .role-desc{font-size:12px;color:var(--ink-soft);line-height:1.4}
  input[type=radio].role-radio{position:absolute;opacity:0;pointer-events:none}

  .field{margin-bottom:18px}
  label{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
  input[type=text],input[type=email],input[type=password],input[type=tel]{
    width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;
    font:inherit;font-size:15px;color:var(--ink);background:#fff;outline:none;
    transition:border-color .15s,box-shadow .15s
  }
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(62,91,217,.12)}
  input.error{border-color:var(--red)}

  .field-error{font-size:12.5px;color:var(--red);margin-top:5px;display:none}
  .field-error.show{display:block}

  .alert{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:20px;display:none}
  .alert.error{background:var(--red-soft);color:var(--red);border:1px solid #f5c6c2;display:block}
  .alert.success{background:var(--green-soft);color:var(--green);border:1px solid #b8e6d5;display:block}

  .pw-strength{margin-top:6px;height:4px;border-radius:99px;background:var(--line);overflow:hidden}
  .pw-strength-bar{height:100%;width:0;border-radius:99px;transition:width .3s,background .3s}

  .consent{display:flex;align-items:flex-start;gap:10px;margin-bottom:22px;font-size:13.5px;color:var(--ink-soft);line-height:1.5}
  .consent input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);flex-shrink:0;margin-top:2px;cursor:pointer}

  .btn{width:100%;padding:14px;border-radius:12px;font:inherit;font-size:16px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-dark)}
  .btn-primary:active{transform:scale(.98)}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}

  .footer-link{text-align:center;margin-top:20px;font-size:14px;color:var(--ink-soft)}

  .spinner{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .password-wrap{position:relative}
  .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-faint);font-size:18px;padding:4px;line-height:1}

  .section-label{font-size:11px;font-weight:800;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">⚖</div>
    <span class="logo-text">LegalConnects</span>
  </div>

  <h1>Create your account</h1>
  <p class="sub">Free to join. No credit card required.</p>

  <div class="alert" id="alert"></div>

  <form id="regForm" novalidate>

    <!-- Role selection -->
    <div class="section-label">I am a</div>
    <div class="role-grid">
      <label class="role-card selected" id="roleClient">
        <input type="radio" class="role-radio" name="role" value="client" checked>
        <span class="role-icon">🧑‍💼</span>
        <div class="role-title">Client</div>
        <div class="role-desc">I need legal help or want to consult an advocate</div>
      </label>
      <label class="role-card" id="roleAdvocate">
        <input type="radio" class="role-radio" name="role" value="advocate">
        <span class="role-icon">⚖️</span>
        <div class="role-title">Advocate</div>
        <div class="role-desc">I am a practicing advocate and want to list my services</div>
      </label>
    </div>

    <!-- Name -->
    <div class="field">
      <label for="fullName">Full name</label>
      <input type="text" id="fullName" name="fullName" placeholder="As on Bar Council / Aadhaar" autocomplete="name" required>
      <div class="field-error" id="nameErr">Please enter your full name.</div>
    </div>

    <!-- Email -->
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
      <div class="field-error" id="emailErr">Please enter a valid email.</div>
    </div>

    <!-- Phone (optional) -->
    <div class="field">
      <label for="phone">Mobile number <span style="font-weight:400;color:var(--ink-faint)">(optional)</span></label>
      <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" autocomplete="tel">
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required>
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">👁</button>
      </div>
      <div class="pw-strength"><div class="pw-strength-bar" id="strengthBar"></div></div>
      <div class="field-error" id="pwErr">Password must be at least 8 characters.</div>
    </div>

    <!-- Consent -->
    <div class="consent">
      <input type="checkbox" id="consent" name="consent" required>
      <label for="consent">
        I agree to LegalConnects'
        <a href="#" target="_blank">Terms of Service</a> and
        <a href="#" target="_blank">Privacy Policy</a>.
        I consent to my data being stored as described therein. (DPDP Act 2023)
      </label>
    </div>
    <div class="field-error" id="consentErr" style="margin-top:-14px;margin-bottom:16px">You must accept the terms to continue.</div>

    <button type="submit" class="btn btn-primary" id="submitBtn">Create Account</button>
  </form>

  <div class="footer-link">
    Already have an account? <a href="login.html">Sign in</a>
  </div>
  <div class="footer-link" style="margin-top:10px">
    <a href="../index.html">← Back to home</a>
  </div>
</div>

<script type="module">
import { supabase } from '../js/config.js';
import { registerUser, redirectByRole } from '../js/auth.js';

// If already logged in, go to dashboard
const { data: { session } } = await supabase.auth.getSession();
if (session) { redirectByRole(); }

const form     = document.getElementById('regForm');
const alertEl  = document.getElementById('alert');
const submitEl = document.getElementById('submitBtn');
const pwEl     = document.getElementById('password');

// Role card toggle
document.querySelectorAll('.role-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
  });
});

// Password toggle
document.getElementById('togglePw').addEventListener('click', () => {
  pwEl.type = pwEl.type === 'password' ? 'text' : 'password';
});

// Password strength indicator
pwEl.addEventListener('input', () => {
  const v = pwEl.value;
  let score = 0;
  if (v.length >= 8)  score++;
  if (v.length >= 12) score++;
  if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
  if (/\d/.test(v))   score++;
  if (/[^a-zA-Z0-9]/.test(v)) score++;

  const bar    = document.getElementById('strengthBar');
  const colors = ['#e6e9f0','#c0392b','#e67e22','#3e5bd9','#0e8a5f'];
  const widths = ['0%','25%','50%','75%','100%'];
  bar.style.width      = widths[score] || '0%';
  bar.style.background = colors[score] || colors[0];
});

function showAlert(msg, type = 'error') {
  alertEl.textContent = msg;
  alertEl.className   = `alert ${type}`;
}

function setLoading(on) {
  submitEl.disabled  = on;
  submitEl.innerHTML = on
    ? '<span class="spinner"></span>Creating account…'
    : 'Create Account';
}

function validate() {
  let ok = true;

  const name = document.getElementById('fullName').value.trim();
  const nameOk = name.length >= 2;
  document.getElementById('nameErr').classList.toggle('show', !nameOk);
  document.getElementById('fullName').classList.toggle('error', !nameOk);
  if (!nameOk) ok = false;

  const email = document.getElementById('email').value.trim();
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  document.getElementById('emailErr').classList.toggle('show', !emailOk);
  document.getElementById('email').classList.toggle('error', !emailOk);
  if (!emailOk) ok = false;

  const pwOk = pwEl.value.length >= 8;
  document.getElementById('pwErr').classList.toggle('show', !pwOk);
  pwEl.classList.toggle('error', !pwOk);
  if (!pwOk) ok = false;

  const consentOk = document.getElementById('consent').checked;
  document.getElementById('consentErr').classList.toggle('show', !consentOk);
  if (!consentOk) ok = false;

  return ok;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  alertEl.className = 'alert';
  if (!validate()) return;

  const role     = document.querySelector('input[name="role"]:checked').value;
  const fullName = document.getElementById('fullName').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = pwEl.value;

  setLoading(true);
  try {
    await registerUser({ fullName, email, password, role });
    showAlert(
      '✅ Account created! Please check your email to confirm your address, then sign in.',
      'success'
    );
    submitEl.disabled = true;
  } catch (err) {
    const msg = err.message?.includes('already registered')
      ? 'This email is already registered. <a href="login.html">Sign in instead?</a>'
      : (err.message || 'Something went wrong. Please try again.');
    alertEl.innerHTML = msg;
    alertEl.className = 'alert error';
  } finally {
    setLoading(false);
  }
});
</script>

</body>
</html>
