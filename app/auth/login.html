<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — LegalConnects</title>
<style>
  :root{
    --ink:#1a2233;--ink-soft:#4b5568;--ink-faint:#8a93a5;
    --accent:#3e5bd9;--accent-dark:#2f46ad;--accent-soft:#eef1fd;
    --green:#0e8a5f;--green-soft:#e7f6ef;
    --red:#c0392b;--red-soft:#fdecea;
    --bg:#fafbfd;--card:#ffffff;--line:#e6e9f0;
    --radius:14px;--shadow:0 1px 3px rgba(26,34,51,.06),0 8px 24px rgba(26,34,51,.07);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:24px}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);width:100%;max-width:440px;padding:40px}

  .logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
  .logo-mark{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:17px;font-weight:800}
  .logo-text{font-size:18px;font-weight:800;letter-spacing:-.02em}

  h1{font-size:22px;font-weight:800;letter-spacing:-.02em;text-align:center;margin-bottom:6px}
  .sub{font-size:14px;color:var(--ink-soft);text-align:center;margin-bottom:28px}

  .field{margin-bottom:18px}
  label{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
  input[type=email],input[type=password]{
    width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;
    font:inherit;font-size:15px;color:var(--ink);background:#fff;outline:none;
    transition:border-color .15s,box-shadow .15s
  }
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(62,91,217,.12)}
  input.error{border-color:var(--red)}

  .field-error{font-size:12.5px;color:var(--red);margin-top:5px;display:none}
  .field-error.show{display:block}

  .alert{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:20px;display:none}
  .alert.error{background:var(--red-soft);color:var(--red);border:1px solid #f5c6c2;display:block}
  .alert.success{background:var(--green-soft);color:var(--green);border:1px solid #b8e6d5;display:block}

  .btn{width:100%;padding:14px;border-radius:12px;font:inherit;font-size:16px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-dark)}
  .btn-primary:active{transform:scale(.98)}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}

  .divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--ink-faint);font-size:13px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}

  .footer-link{text-align:center;margin-top:20px;font-size:14px;color:var(--ink-soft)}

  .spinner{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .password-wrap{position:relative}
  .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-faint);font-size:18px;padding:4px;line-height:1}
  .toggle-pw:hover{color:var(--ink-soft)}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">⚖</div>
    <span class="logo-text">LegalConnects</span>
  </div>

  <h1>Welcome back</h1>
  <p class="sub">Sign in to your account</p>

  <div class="alert" id="alert"></div>

  <form id="loginForm" novalidate>
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
      <div class="field-error" id="emailErr">Please enter a valid email.</div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">👁</button>
      </div>
      <div class="field-error" id="pwErr">Password is required.</div>
    </div>

    <button type="submit" class="btn btn-primary" id="submitBtn">Sign In</button>
  </form>

  <div class="divider">or</div>

  <div class="footer-link">
    Don't have an account? <a href="register.html">Create one free</a>
  </div>
  <div class="footer-link" style="margin-top:10px">
    <a href="../index.html">← Back to home</a>
  </div>
</div>

<script type="module">
import { supabase } from '../js/config.js';
import { loginUser, redirectByRole } from '../js/auth.js';

// If already logged in, redirect
const { data: { session } } = await supabase.auth.getSession();
if (session) { redirectByRole(); }

const form     = document.getElementById('loginForm');
const emailEl  = document.getElementById('email');
const pwEl     = document.getElementById('password');
const alertEl  = document.getElementById('alert');
const submitEl = document.getElementById('submitBtn');

// Toggle password visibility
document.getElementById('togglePw').addEventListener('click', () => {
  pwEl.type = pwEl.type === 'password' ? 'text' : 'password';
});

function showAlert(msg, type = 'error') {
  alertEl.textContent  = msg;
  alertEl.className    = `alert ${type}`;
}

function clearAlert() {
  alertEl.className = 'alert';
}

function setLoading(on) {
  submitEl.disabled  = on;
  submitEl.innerHTML = on
    ? '<span class="spinner"></span>Signing in…'
    : 'Sign In';
}

function validate() {
  let ok = true;
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value.trim());
  document.getElementById('emailErr').classList.toggle('show', !emailOk);
  emailEl.classList.toggle('error', !emailOk);
  if (!emailOk) ok = false;

  const pwOk = pwEl.value.length >= 6;
  document.getElementById('pwErr').classList.toggle('show', !pwOk);
  pwEl.classList.toggle('error', !pwOk);
  if (!pwOk) ok = false;

  return ok;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearAlert();
  if (!validate()) return;

  setLoading(true);
  try {
    await loginUser({ email: emailEl.value.trim(), password: pwEl.value });
    showAlert('Signed in! Redirecting…', 'success');
    await redirectByRole();
  } catch (err) {
    const msg = err.message?.includes('Invalid login credentials')
      ? 'Wrong email or password. Please try again.'
      : (err.message || 'Something went wrong. Please try again.');
    showAlert(msg);
  } finally {
    setLoading(false);
  }
});
</script>

</body>
</html>
