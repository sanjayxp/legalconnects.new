<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in or Create Account — LegalConnects</title>
<meta name="robots" content="noindex">
<style>
  :root{
    --ink:#1a2233;--ink-soft:#4b5568;--ink-faint:#8a93a5;
    --accent:#3e5bd9;--accent-dark:#2f46ad;--accent-soft:#eef1fd;
    --green:#0e8a5f;--green-soft:#e7f6ef;
    --red:#c0392b;--red-soft:#fdecea;
    --amber:#b45309;--amber-soft:#fdf3e3;
    --bg:#fafbfd;--card:#ffffff;--line:#e6e9f0;
    --shadow:0 1px 3px rgba(26,34,51,.06),0 8px 24px rgba(26,34,51,.07);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;min-height:100vh}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  /* Site header — same as the main website for continuity */
  header{background:var(--card);border-bottom:1px solid var(--line)}
  .nav{max-width:1120px;margin:0 auto;padding:0 24px;display:flex;align-items:center;height:64px}
  .logo{font-size:20px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;color:var(--ink)}
  .logo .mark{width:30px;height:30px;border-radius:8px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:15px}
  .backlink{margin-left:auto;font-size:14px;font-weight:600}

  .wrap{max-width:440px;margin:40px auto 64px;padding:0 20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px;box-shadow:var(--shadow)}
  h2{font-size:20px;margin-bottom:4px}
  .sub{font-size:13.5px;color:var(--ink-soft);margin-bottom:20px}

  .modetabs{display:grid;grid-template-columns:1fr 1fr;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:20px}
  .modetab{border:none;border-radius:9px;padding:9px;font:inherit;font-size:14px;font-weight:700;color:var(--ink-faint);background:transparent;cursor:pointer;transition:all .2s}
  .modetab.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(26,34,51,.12)}

  .roletabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
  .roletab{border:1.5px solid var(--line);border-radius:11px;padding:11px 8px;text-align:center;font:inherit;font-size:13px;font-weight:600;color:var(--ink-soft);background:#fff;cursor:pointer;transition:all .15s}
  .roletab.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-dark)}
  .roletab .ric{display:block;font-size:20px;margin-bottom:3px}

  label{font-size:12.5px;font-weight:700;display:block;margin:13px 0 6px}
  input[type=text],input[type=email],input[type=password],input[type=tel]{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font:inherit;font-size:14.5px;background:#fff;color:var(--ink);outline:none;transition:border-color .15s}
  input:focus{border-color:var(--accent)}

  .consent{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--ink-soft);margin-top:14px;line-height:1.5}
  .consent input{width:15px;height:15px;accent-color:var(--accent);margin-top:2px;flex-shrink:0}

  .btn{width:100%;border:none;border-radius:11px;padding:13px;font:inherit;font-size:15px;font-weight:700;background:var(--accent);color:#fff;cursor:pointer;margin-top:18px;transition:background .15s}
  .btn:hover{background:var(--accent-dark)}
  .btn:disabled{opacity:.6;cursor:wait}

  .msg{border-radius:10px;padding:11px 14px;font-size:13.5px;margin-top:14px;display:none}
  .msg.err{display:block;background:var(--red-soft);color:var(--red)}
  .msg.ok{display:block;background:var(--green-soft);color:var(--green)}

  .authlink{font-size:13px;color:var(--ink-soft);text-align:center;margin-top:16px}
  .authlink b{color:var(--accent);cursor:pointer;font-weight:700}
  .pane{display:none}
  .pane.on{display:block;animation:fadeUp .3s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .note{font-size:11.5px;color:var(--ink-faint);text-align:center;margin-top:16px}
</style>
</head>
<body>

<header>
  <div class="nav">
    <a class="logo" href="../../"><span class="mark">⚖</span>LegalConnects</a>
    <a class="backlink" href="../../">← Back to website</a>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <div class="modetabs">
      <button class="modetab on" id="mt-login" onclick="setMode('login')">Log in</button>
      <button class="modetab" id="mt-reg" onclick="setMode('reg')">Create account</button>
    </div>

    <!-- ===== LOGIN ===== -->
    <div class="pane on" id="pane-login">
      <h2>Welcome back</h2>
      <div class="sub">Log in to your LegalConnects account.</div>
      <label for="li-email">Email</label>
      <input type="email" id="li-email" placeholder="you@example.com" autocomplete="email">
      <label for="li-pass">Password</label>
      <input type="password" id="li-pass" placeholder="••••••••" autocomplete="current-password">
      <button class="btn" id="btn-login">Log in</button>
      <div class="authlink">New to LegalConnects? <b onclick="setMode('reg')">Create an account</b></div>
    </div>

    <!-- ===== REGISTER ===== -->
    <div class="pane" id="pane-reg">
      <h2 id="reg-title">Create your account</h2>
      <div class="sub" id="reg-sub">Free to join. No credit card required.</div>
      <div class="roletabs">
        <button class="roletab on" id="role-client" onclick="setRole('client')"><span class="ric">🧑‍💼</span>I need legal help</button>
        <button class="roletab" id="role-advocate" onclick="setRole('advocate')"><span class="ric">⚖️</span>I'm an advocate</button>
      </div>
      <label for="rg-name">Full name</label>
      <input type="text" id="rg-name" placeholder="As on Bar Council / Aadhaar" autocomplete="name">
      <label for="rg-email">Email</label>
      <input type="email" id="rg-email" placeholder="you@example.com" autocomplete="email">
      <label for="rg-phone">Mobile <span style="font-weight:400;color:var(--ink-faint)">(optional)</span></label>
      <input type="tel" id="rg-phone" placeholder="+91" autocomplete="tel">
      <label for="rg-pass">Password</label>
      <input type="password" id="rg-pass" placeholder="Minimum 8 characters" autocomplete="new-password">
      <div class="consent">
        <input type="checkbox" id="rg-consent">
        <label for="rg-consent" style="margin:0;font-size:12.5px;font-weight:400;text-transform:none;letter-spacing:0">I agree to the Terms of Service and Privacy Policy, and consent to my data being processed to provide this service (DPDP Act 2023).</label>
      </div>
      <button class="btn" id="btn-reg">Create Account</button>
      <div class="authlink">Already have an account? <b onclick="setMode('login')">Log in</b></div>
    </div>

    <div class="msg" id="msg"></div>
    <div class="note" id="role-note">Advocate profiles go live after Bar Council verification.</div>
  </div>
</div>

<script type="module">
import { supabase } from '../js/config.js';
import { registerUser, loginUser, redirectByRole, getCurrentProfile, appPath } from '../js/auth.js';

// Already logged in? Straight to the right dashboard.
const { data: { session } } = await supabase.auth.getSession();
if (session) { redirectByRole(); }

let role = 'client';
window.setMode = function(m){
  document.getElementById('mt-login').classList.toggle('on', m==='login');
  document.getElementById('mt-reg').classList.toggle('on', m==='reg');
  document.getElementById('pane-login').classList.toggle('on', m==='login');
  document.getElementById('pane-reg').classList.toggle('on', m==='reg');
  say('');
};
window.setRole = function(r){
  role = r;
  document.getElementById('role-client').classList.toggle('on', r==='client');
  document.getElementById('role-advocate').classList.toggle('on', r==='advocate');
};

// Deep links: #register opens the create-account tab (used by the main site)
if (location.hash === '#register') setMode('reg');

function say(text, kind){
  const m = document.getElementById('msg');
  m.className = 'msg' + (text ? ' ' + kind : '');
  m.textContent = text;
}
function busy(id, on, label){
  const b = document.getElementById(id);
  b.disabled = on; b.textContent = on ? 'Please wait…' : label;
}

document.getElementById('btn-login').addEventListener('click', async () => {
  const email = document.getElementById('li-email').value.trim();
  const pass  = document.getElementById('li-pass').value;
  if (!email || !pass) { say('Enter your email and password.', 'err'); return; }
  busy('btn-login', true, 'Log in');
  try {
    await loginUser({ email, password: pass });
    const profile = await getCurrentProfile();
    if (profile && profile.role === 'admin') {
      await supabase.auth.signOut();
      say('Admin accounts sign in at the admin console, not here.', 'err');
      const m = document.getElementById('msg');
      const link = document.createElement('a');
      link.href = appPath('/admin/');
      link.textContent = ' Go to admin console →';
      link.style.fontWeight = '700';
      m.appendChild(link);
      return;
    }
    await redirectByRole();
  } catch (err) {
    say(err.message === 'Invalid login credentials'
      ? 'Email or password is incorrect.' : (err.message || 'Something went wrong.'), 'err');
  } finally { busy('btn-login', false, 'Log in'); }
});
document.getElementById('li-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-login').click();
});

document.getElementById('btn-reg').addEventListener('click', async () => {
  const fullName = document.getElementById('rg-name').value.trim();
  const email    = document.getElementById('rg-email').value.trim();
  const pass     = document.getElementById('rg-pass').value;
  if (!fullName || !email) { say('Please fill in your name and email.', 'err'); return; }
  if (pass.length < 8)     { say('Password needs at least 8 characters.', 'err'); return; }
  if (!document.getElementById('rg-consent').checked) { say('Please accept the terms to continue.', 'err'); return; }
  busy('btn-reg', true, 'Create Account');
  try {
    const data = await registerUser({ fullName, email, password: pass, role });
    if (data.session) { await redirectByRole(); }
    else say('✓ Account created! Check your email for a confirmation link, then log in.', 'ok');
  } catch (err) {
    say(err.message?.includes('already registered')
      ? 'This email is already registered — use the Log in tab instead.'
      : (err.message || 'Something went wrong. Please try again.'), 'err');
  } finally { busy('btn-reg', false, 'Create Account'); }
});
</script>

</body>
</html>
